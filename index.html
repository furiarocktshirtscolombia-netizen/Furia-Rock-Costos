<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furia Rock Kids - Cotizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.6.0/dist/jspdf.plugin.autotable.min.js"></script>
    <style>
      :root {
        --bg-main: #0b0b0d;
        --bg-secondary: #121317;
        --bg-card: #1a1d24;
        --bg-card-2: #20242d;

        --text-main: #ffffff;
        --text-soft: #b9c0cc;
        --text-muted: #8f97a6;

        --border: rgba(255,255,255,0.08);
        --shadow: 0 12px 30px rgba(0,0,0,0.35);

        --accent: #ff7a00;
        --accent-hover: #ff8f26;
        --accent-dark: #d96500;

        --success: #4ade80;
        --danger: #ef4444;

        --radius: 18px;
      }

      body {
        font-family: 'Inter', sans-serif;
        background:
          linear-gradient(rgba(11,11,13,0.88), rgba(11,11,13,0.9)),
          radial-gradient(circle at top left, rgba(255,122,0,0.08), transparent 30%),
          radial-gradient(circle at bottom right, rgba(255,122,0,0.05), transparent 25%),
          var(--bg-main);
        color: var(--text-main);
        margin: 0;
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* PANEL STYLE */
      .panel, .card, .dashboard-card, .section-box {
        background: linear-gradient(180deg, var(--bg-card), var(--bg-card-2));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        color: var(--text-main);
        box-shadow: var(--shadow);
      }

      /* SELECT & INPUT FIX */
      select, input, textarea {
        background: #2a3140 !important;
        color: var(--text-main) !important;
        border: 1px solid rgba(255,255,255,0.10) !important;
        border-radius: 12px !important;
        padding: 10px 14px !important;
        outline: none;
        transition: all 0.2s ease;
        font-weight: 500;
      }

      input::placeholder, textarea::placeholder {
        color: var(--text-muted) !important;
      }

      select:focus, input:focus, textarea:focus {
        border-color: var(--accent) !important;
      }

      select option {
        background: #ffffff !important;
        color: #111111 !important;
      }

      /* BUTTONS */
      .btn-primary, button.primary {
        background: linear-gradient(180deg, var(--accent), var(--accent-dark)) !important;
        color: #ffffff !important;
        border: none !important;
        border-radius: 12px !important;
        padding: 10px 18px !important;
        font-weight: 700 !important;
        cursor: pointer !important;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.2s ease;
      }

      .btn-primary:hover, button.primary:hover {
        background: linear-gradient(180deg, var(--accent-hover), var(--accent)) !important;
        transform: translateY(-1px);
      }

      .btn-light, button.light {
        background: #ffffff !important;
        color: #111111 !important;
        border: none !important;
        border-radius: 12px !important;
        padding: 10px 18px !important;
        font-weight: 700 !important;
        cursor: pointer !important;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* TABLES */
      table {
        width: 100%;
        border-collapse: collapse;
        background: transparent;
      }

      table thead {
        background: #111318;
      }

      table th {
        color: var(--text-main);
        font-weight: 700;
        padding: 12px;
        border-bottom: 1px solid var(--border);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      table td {
        color: var(--text-soft);
        padding: 12px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      .app-header {
        background: rgba(0,0,0,0.92);
        border-bottom: 1px solid rgba(255,255,255,0.05);
        padding: 14px 30px;
      }

      .logo-img {
        height: 48px;
        width: auto;
        border-radius: 8px;
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-main); }
      ::-webkit-scrollbar-thumb { background: var(--bg-card-2); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

      /* Info Strip */
      .info-strip {
        background: #000000;
        color: white;
        padding: 40px;
        text-align: center;
      }

      /* FAQ Section */
      .faq-section {
        background: var(--bg-card);
        padding: 60px 40px;
        color: var(--text-main);
      }

      /* Badges */
      .badge-orange {
        background: rgba(255,122,0,0.15);
        color: var(--accent);
        border: 1px solid rgba(255,122,0,0.25);
        padding: 4px 10px;
        border-radius: 999px;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
        "recharts": "https://esm.sh/recharts@^3.7.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
        "xlsx": "https://esm.sh/xlsx@0.18.5",
        "jspdf": "https://esm.sh/jspdf@2.5.1",
        "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.6.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
          "fabric": "https://esm.sh/fabric@6"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <!-- Contenedor oculto opcional -->
    <div id="pdf-export-container"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
