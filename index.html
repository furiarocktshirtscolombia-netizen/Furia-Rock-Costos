<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Furia Rock Kids - Cotizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.6.0/dist/jspdf.plugin.autotable.min.js"></script>
    <style>
      :root {
        --color-fondo-principal: #0B0B0B;
        --color-fondo-secundario: #1A1A1A;

        --color-panel: #FFFFFF;
        --color-panel-suave: #F2F2F2;

        --color-texto: #111111;
        --color-texto-inverso: #FFFFFF;
        --color-texto-secundario: #777777;

        --color-borde: #D8D8D8;

        --color-hover: #333333;

        /* Splatter accents (keeping for brand identity but integrating with new theme) */
        --hot-pink: #FF4FD8;
        --neon-green: #34FF4A;
        --aqua: #36E6FF;
        --sun: #FFD23F;

        --radius: 14px;
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--color-fondo-secundario);
        color: var(--color-texto-inverso);
        margin: 0;
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* PANEL STYLE */
      .panel {
        background: var(--color-panel);
        border-radius: var(--radius);
        padding: 20px;
        border: 1px solid var(--color-borde);
        color: var(--color-texto);
        box-shadow: var(--shadow);
      }

      /* SELECT & INPUT FIX */
      select, input, textarea {
        background: var(--color-panel-suave) !important;
        color: var(--color-texto) !important;
        border: 1px solid var(--color-borde) !important;
        border-radius: 8px !important;
        padding: 10px !important;
        outline: none;
        transition: all 0.2s ease;
        font-weight: 500;
      }

      select:focus, input:focus, textarea:focus {
        border-color: var(--color-hover) !important;
      }

      select option {
        background: white !important;
        color: black !important;
      }

      /* BUTTONS */
      button {
        background: var(--color-fondo-principal);
        color: var(--color-texto-inverso);
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.2s ease;
      }

      button:hover:not(:disabled) {
        background: var(--color-hover);
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* TABLES */
      table {
        width: 100%;
        border-collapse: collapse;
      }

      table thead {
        background: var(--color-fondo-principal);
        color: var(--color-texto-inverso);
      }

      table th {
        padding: 12px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      table td {
        padding: 12px;
        border-bottom: 1px solid var(--color-borde);
        color: var(--color-texto);
      }

      .app-header {
        background: var(--color-fondo-principal);
        border-bottom: 1px solid var(--border);
        padding: 14px 30px;
      }

      .logo-img {
        height: 48px;
        width: auto;
        border-radius: 8px;
      }

      .splatter-pink { color: var(--hot-pink); }
      .splatter-green { color: var(--neon-green); }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--color-fondo-principal); }
      ::-webkit-scrollbar-thumb { background: var(--color-hover); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--hot-pink); }

      /* Info Strip */
      .info-strip {
        background: #000000;
        color: white;
        padding: 40px;
        text-align: center;
      }

      /* FAQ Section */
      .faq-section {
        background: var(--color-panel-suave);
        padding: 60px 40px;
        color: var(--color-texto);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
        "recharts": "https://esm.sh/recharts@^3.7.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
        "xlsx": "https://esm.sh/xlsx@0.18.5",
        "jspdf": "https://esm.sh/jspdf@2.5.1",
        "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.6.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <!-- Contenedor oculto opcional -->
    <div id="pdf-export-container"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
